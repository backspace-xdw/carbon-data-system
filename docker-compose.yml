version: '3.8'

services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: carbon-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-carbon2024!}
      - DOCKER_INFLUXDB_INIT_ORG=carbon-system
      - DOCKER_INFLUXDB_INIT_BUCKET=energy_realtime
      - DOCKER_INFLUXDB_INIT_RETENTION=7d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-carbon-system-token-2024}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
      - ./docker/influxdb/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - carbon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: carbon-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - carbon-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: carbon-nginx
    ports:
      - "${NGINX_PORT:-50002}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - influxdb
    networks:
      - carbon-network
    restart: unless-stopped

volumes:
  influxdb_data:
  influxdb_config:
  mosquitto_data:
  mosquitto_log:

networks:
  carbon-network:
    driver: bridge
